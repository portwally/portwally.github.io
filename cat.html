    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d0d1a;
            color: #fff;
            min-height: 100vh;
            padding: 40px 20px;
        }
        h1 {
            text-align: center;
            margin-bottom: 40px;
            font-size: 2.2rem;
            color: #fff;
            text-shadow: 0 0 20px rgba(255,255,255,0.15);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 18px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .grid a {
            display: block;
            text-decoration: none;
        }
        .grid a button {
            width: 100%;
            padding: 20px 16px;
            font-size: 1rem;
            font-weight: 700;
            border: 2px solid var(--clr);
            border-radius: 14px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.3s, background 0.3s;
            box-shadow: 0 0 12px var(--clr), inset 0 0 12px rgba(0,0,0,0.4);
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
        .grid a button:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 0 24px var(--clr), 0 0 48px var(--clr), inset 0 0 12px rgba(0,0,0,0.3);
            background: rgba(255,255,255,0.08);
        }
        .grid a button:active {
            transform: translateY(0) scale(0.98);
        }

        .grid a:nth-child(1)  button { --clr: #ff6b6b; }
        .grid a:nth-child(2)  button { --clr: #ffa94d; }
        .grid a:nth-child(3)  button { --clr: #ffd43b; }
