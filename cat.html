        h1 {
            text-align: center;

            color: #e0e0e0;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .grid a {
            display: block;
            text-decoration: none;
        }
        .grid a button {
            width: 100%;
            padding: 18px 16px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            background: #16213e;
            color: #e0e0e0;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
        }
        .grid a button:hover {
            background: #0f3460;
            transform: translateY(-2px);
        }
        .grid a button:active {
            transform: translateY(0);
        }
    </style>
