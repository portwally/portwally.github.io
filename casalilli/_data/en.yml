about:
  title: "Welcome to Casa da Lili"
  lead: "This programme was designed for those who feel the need to slow down, rest and take care of themselves more consciously."
  body: "Throughout the stay, each person is welcomed at their own pace, with space for silence, nature, rest and therapeutic support. The experience brings together simple yet deeply meaningful moments: rest, nature walks, nourishing meals, mindfulness practices and therapies tailored to each person's needs."

place:
  title: "The Place"
  image: "img/terrace-lavender.jpg"
  image_alt: "Terrace with lavender and sea view"
  fragments:
    - heading: "Between the mountains and the sea"
      text: "The house sits in a quiet village, surrounded by nature and minutes from the Atlantic."
    - heading: "A different pace"
      text: "Here, time slows down. There is no imposed schedule — only presence."
    - heading: "Silence that restores"
      text: "The silence of the house is not emptiness — it is the beginning of something."

gallery:
  title: "The House"
  prev_label: "Previous"
  next_label: "Next"

audience:
  title: "Who Is This Programme For?"
  cards:
    - heading: "Burnout"
      text: "For those experiencing professional exhaustion or burnout who need a genuine pause to recover."
    - heading: "Life Transitions"
      text: "For those going through major changes — career shifts, relationship endings, grief — who need space to recentre."
    - heading: "Emotional Fatigue"
      text: "For those carrying the accumulated weight of daily life who wish to release tension in a mindful way."
    - heading: "Reconnection"
      text: "For those who simply feel the time has come to care for themselves with more presence and depth."

day:
  title: "A Day Here"
  steps:
    - time: "Morning"
      heading: "Arrival and welcome"
      text: "Your stay begins with a quiet conversation, a homemade breakfast, and all the time you need to settle in."
      image: "img/house-entrance.jpg"
      image_alt: "House entrance"
    - time: "Mid-Morning"
      heading: "Movement and breath"
      text: "A gentle yoga or breathwork session on the terrace, with the sea as your backdrop."
      image: "img/terrace-1.jpg"
      image_alt: "Terrace with sea view"
    - time: "Afternoon"
      heading: "Walk in nature"
      text: "A quiet walk through the village paths or along the coastline. No fixed destination required."
      image: "img/view-garden.jpg"
      image_alt: "View of the garden"
    - time: "Late Afternoon"
      heading: "Therapeutic session"
      text: "A moment just for you — Reiki, massage, therapy or meditation, depending on what you need."
      image: "img/interior-chakra.jpg"
      image_alt: "Therapy space"
    - time: "Evening"
      heading: "Dinner and stillness"
      text: "A nourishing meal, and then stillness. The house holds you as the day ends."
      image: "img/interior-lounge.jpg"
      image_alt: "Living room"

