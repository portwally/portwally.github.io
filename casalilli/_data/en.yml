therapies:
  title: "Our Therapies"
  lead: "Each session is chosen together with the guest, based on their needs and preferences."
  items:
    - icon: "✦"
      title: "Reiki"
      description: "A Japanese energy healing technique that promotes physical, emotional and spiritual balance through the channelling of energy by the hands."
    - icon: "◈"
      title: "Ayurvedic Massage"
      description: "A therapeutic massage rooted in traditional Indian medicine, using warm oils and specific movements to release tensions and restore energy flow."
    - icon: "⬡"
      title: "Multidimensional Therapy"
      description: "A holistic approach that works across different energetic levels, integrating body, mind and emotions to promote deep healing."
    - icon: "❧"
      title: "Yoga and Breathwork"
      description: "Gentle movement and breathing practices that calm the nervous system and promote body awareness and presence."
    - icon: "◎"
      title: "Meditation"
      description: "Guided mindfulness practice that cultivates inner calm, mental clarity and the ability to observe without judgement."

testimonials:
  title: "Voices from Guests"
  items:
    - text: "It was an experience that gave me back to myself. The silence, the nature, the warmth of it all… everything made sense. I left feeling lighter and with a clarity I hadn't had in months."
      cite: "Guest, 2-Day Programme"
    - text: "I never thought three days could shift my perspective so profoundly. The care with which I was received was unlike anything I had known."
      cite: "Guest, 3-Day Programme"
    - text: "I came to rest and left with a sense of deep renewal. The balance between therapies, nature and silence was perfect."
      cite: "Guest, 1-Day Programme"

approach:
  title: "Our Approach"
  paragraphs:
    - "At Casa da Lili, wellbeing is embraced in a simple, human and personalised way. The surrounding nature, the silence of the house, the view over the Atlantic and the unhurried rhythm of the stay are all essential parts of the experience."
    - "Therapeutic support is offered with attentive listening, presence and respect for each person's moment. More than a fixed programme, this is an invitation to conscious care."
  highlight: "Casa da Lili does not follow a rigid or mass-produced format. Each stay is lived intimately, simply and adapted to the life moment of each guest."

quote_banner:
  text: "Caring for yourself is not a luxury. It is the beginning of everything."

