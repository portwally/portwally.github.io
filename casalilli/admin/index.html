<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casa da Lili — Editor</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
    <script>
      // Cross-domain setup: this admin page lives on github.io
      // but Identity + Git Gateway run on a Netlify project.
      // Netlify site name MUST be: casadalili-cms
      window.netlifyIdentity && window.netlifyIdentity.init({
        APIUrl: "https://casadalili-cms.netlify.app/.netlify/identity"
      });
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
