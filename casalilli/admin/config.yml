backend:
  name: git-gateway
  branch: main

media_folder: "img"
public_folder: "/img"

locale: 'pt'

collections:
  # ============================================================
  # PORTUGUÊS
  # ============================================================
  - name: "pt"
    label: "🇵🇹 Português"
    label_singular: "Página em Português"
    description: "Edite o conteúdo da página em Português"
    files:
      - file: "_data/pt.yml"
        label: "Página em Português"
        name: "pt_page"
        fields:
          - label: "Idioma (não alterar)"
            name: "lang"
            widget: "hidden"
            default: "pt"

          - label: "Meta — SEO"
            name: "meta"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Título da página (separador do navegador)", name: "title", widget: "string" }
              - { label: "Descrição (Google)", name: "description", widget: "text" }

          - label: "Menu de Navegação"
            name: "nav"
            widget: "object"
            collapsed: true
            fields:
              - { label: "ID Sobre (não alterar)", name: "about_id", widget: "hidden", default: "sobre" }
              - { label: "Rótulo Sobre", name: "about_label", widget: "string" }
              - { label: "ID Programas (não alterar)", name: "programmes_id", widget: "hidden", default: "programas" }
              - { label: "Rótulo Programas", name: "programmes_label", widget: "string" }
              - { label: "ID Terapias (não alterar)", name: "therapies_id", widget: "hidden", default: "terapias" }
              - { label: "Rótulo Terapias", name: "therapies_label", widget: "string" }
              - { label: "ID Contacto (não alterar)", name: "contact_id", widget: "hidden", default: "contacto" }
              - { label: "Rótulo Reservar", name: "contact_label", widget: "string" }

          - label: "Hero (Topo da Página)"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Título grande", name: "title", widget: "string" }
              - { label: "Subtítulo", name: "subtitle", widget: "string" }
              - { label: "Tagline — primeira linha", name: "tagline_line1", widget: "string" }
              - { label: "Tagline — segunda linha", name: "tagline_line2", widget: "string" }
              - { label: "Texto do botão", name: "cta", widget: "string" }

          - label: "Sobre"
            name: "about"
            widget: "object"
            fields:
              - { label: "Título da secção", name: "title", widget: "string" }
              - { label: "Texto principal (lead)", name: "lead", widget: "text" }
              - { label: "Corpo do texto", name: "body", widget: "text" }

          - label: "O Lugar"
            name: "place"
            widget: "object"
            fields:
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Imagem principal", name: "image", widget: "image" }
              - { label: "Descrição da imagem (acessibilidade)", name: "image_alt", widget: "string" }
              - label: "Fragmentos (textos curtos)"
                name: "fragments"
                widget: "list"
                fields:
                  - { label: "Título do fragmento", name: "heading", widget: "string" }
                  - { label: "Texto", name: "text", widget: "text" }

          - label: "Galeria — Rótulos"
            name: "gallery"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Título da secção", name: "title", widget: "string" }
              - { label: "Botão Anterior", name: "prev_label", widget: "string" }
              - { label: "Botão Próximo", name: "next_label", widget: "string" }

          - label: "Para Quem É"
            name: "audience"
            widget: "object"
            fields:
              - { label: "Título da secção", name: "title", widget: "string" }
              - label: "Cartões"
                name: "cards"
                widget: "list"
                fields:
                  - { label: "Título", name: "heading", widget: "string" }
                  - { label: "Texto", name: "text", widget: "text" }

          - label: "Um Dia Aqui"
            name: "day"
            widget: "object"
            fields:
              - { label: "Título da secção", name: "title", widget: "string" }
              - label: "Etapas do dia"
                name: "steps"
                widget: "list"
                fields:
                  - { label: "Hora (ex. Manhã)", name: "time", widget: "string" }
                  - { label: "Título", name: "heading", widget: "string" }
                  - { label: "Texto", name: "text", widget: "text" }
                  - { label: "Imagem", name: "image", widget: "image" }
                  - { label: "Descrição da imagem", name: "image_alt", widget: "string" }

          - label: "Programas"
            name: "programmes"
            widget: "object"
            fields:
              - { label: "Título da secção", name: "title", widget: "string" }
              - { label: "Texto introdutório", name: "lead", widget: "text" }
              - label: "Programas (cartões)"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Duração (ex. 1 Dia)", name: "duration", widget: "string" }
                  - { label: "Título do programa", name: "title", widget: "string" }
                  - { label: "Descrição curta", name: "description", widget: "text" }
                  - { label: "O que inclui (lista)", name: "includes", widget: "list", field: { label: "Item", name: "item", widget: "string" } }
                  - { label: "Preço (ex. A partir de €120)", name: "price", widget: "string" }
                  - { label: "Destacar este programa?", name: "featured", widget: "boolean", default: false }
                  - { label: "Etiqueta de destaque (ex. Mais Popular)", name: "badge", widget: "string", required: false, default: "" }

          - label: "Terapias"
            name: "therapies"
            widget: "object"
            fields:
              - { label: "Título da secção", name: "title", widget: "string" }
              - { label: "Texto introdutório", name: "lead", widget: "text" }
              - label: "Terapias (cartões)"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Ícone (símbolo Unicode)", name: "icon", widget: "string", hint: "Pode deixar como está. Ex: ✦ ◈ ⬡ ❧ ◎" }
                  - { label: "Nome da terapia", name: "title", widget: "string" }
                  - { label: "Descrição", name: "description", widget: "text" }

          - label: "Testemunhos"
            name: "testimonials"
            widget: "object"
            fields:
              - { label: "Título da secção", name: "title", widget: "string" }
              - label: "Testemunhos"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Texto do testemunho", name: "text", widget: "text" }
                  - { label: "Atribuição (ex. Convidada, Programa de 2 Dias)", name: "cite", widget: "string" }

          - label: "A Nossa Abordagem"
            name: "approach"
            widget: "object"
            fields:
              - { label: "Título da secção", name: "title", widget: "string" }
              - { label: "Parágrafos", name: "paragraphs", widget: "list", field: { label: "Parágrafo", name: "paragraph", widget: "text" } }
              - { label: "Frase em destaque (no fim)", name: "highlight", widget: "text" }

          - label: "Banner com Frase"
            name: "quote_banner"
            widget: "object"
            fields:
              - { label: "Frase do banner", name: "text", widget: "string" }

          - label: "Contacto — Rótulos"
            name: "contact"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Título da secção", name: "title", widget: "string" }
              - { label: "Texto introdutório", name: "lead", widget: "text" }
              - { label: "Rótulo Email", name: "email_label", widget: "string" }
              - { label: "Rótulo Telefone", name: "phone_label", widget: "string" }
              - { label: "Rótulo Instagram", name: "instagram_label", widget: "string" }

          - label: "Rodapé"
            name: "footer"
            widget: "object"
            fields:
              - { label: "Frase do rodapé", name: "quote", widget: "string" }
              - { label: "Aviso de copyright", name: "copyright", widget: "string" }

  # ============================================================
  # ENGLISH
  # ============================================================
  - name: "en"
    label: "🇬🇧 English"
    label_singular: "English Page"
    description: "Edit the English version of the page"
    files:
      - file: "_data/en.yml"
        label: "English Page"
        name: "en_page"
        fields:
          - label: "Language (do not change)"
            name: "lang"
            widget: "hidden"
            default: "en"

          - label: "Meta — SEO"
            name: "meta"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Page title (browser tab)", name: "title", widget: "string" }
              - { label: "Description (Google)", name: "description", widget: "text" }

          - label: "Navigation Menu"
            name: "nav"
            widget: "object"
            collapsed: true
            fields:
              - { label: "About ID (do not change)", name: "about_id", widget: "hidden", default: "about" }
              - { label: "About label", name: "about_label", widget: "string" }
              - { label: "Programmes ID (do not change)", name: "programmes_id", widget: "hidden", default: "programmes" }
              - { label: "Programmes label", name: "programmes_label", widget: "string" }
              - { label: "Therapies ID (do not change)", name: "therapies_id", widget: "hidden", default: "therapies" }
              - { label: "Therapies label", name: "therapies_label", widget: "string" }
              - { label: "Contact ID (do not change)", name: "contact_id", widget: "hidden", default: "contact" }
              - { label: "Book Now label", name: "contact_label", widget: "string" }

          - label: "Hero (top of page)"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Big title", name: "title", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "string" }
              - { label: "Tagline — first line", name: "tagline_line1", widget: "string" }
              - { label: "Tagline — second line", name: "tagline_line2", widget: "string" }
              - { label: "Button text", name: "cta", widget: "string" }

          - label: "About"
            name: "about"
            widget: "object"
            fields:
              - { label: "Section title", name: "title", widget: "string" }
              - { label: "Lead text", name: "lead", widget: "text" }
              - { label: "Body text", name: "body", widget: "text" }

          - label: "The Place"
            name: "place"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Main image", name: "image", widget: "image" }
              - { label: "Image description (accessibility)", name: "image_alt", widget: "string" }
              - label: "Fragments (short texts)"
                name: "fragments"
                widget: "list"
                fields:
                  - { label: "Fragment heading", name: "heading", widget: "string" }
                  - { label: "Text", name: "text", widget: "text" }

          - label: "Gallery — Labels"
            name: "gallery"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Section title", name: "title", widget: "string" }
              - { label: "Previous button label", name: "prev_label", widget: "string" }
              - { label: "Next button label", name: "next_label", widget: "string" }

          - label: "Who Is It For"
            name: "audience"
            widget: "object"
            fields:
              - { label: "Section title", name: "title", widget: "string" }
              - label: "Cards"
                name: "cards"
                widget: "list"
                fields:
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Text", name: "text", widget: "text" }

          - label: "A Day Here"
            name: "day"
            widget: "object"
            fields:
              - { label: "Section title", name: "title", widget: "string" }
              - label: "Day steps"
                name: "steps"
                widget: "list"
                fields:
                  - { label: "Time (e.g. Morning)", name: "time", widget: "string" }
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Text", name: "text", widget: "text" }
                  - { label: "Image", name: "image", widget: "image" }
                  - { label: "Image description", name: "image_alt", widget: "string" }

          - label: "Programmes"
            name: "programmes"
            widget: "object"
            fields:
              - { label: "Section title", name: "title", widget: "string" }
              - { label: "Lead text", name: "lead", widget: "text" }
              - label: "Programmes (cards)"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Duration (e.g. 1 Day)", name: "duration", widget: "string" }
                  - { label: "Programme title", name: "title", widget: "string" }
                  - { label: "Short description", name: "description", widget: "text" }
                  - { label: "What's included (list)", name: "includes", widget: "list", field: { label: "Item", name: "item", widget: "string" } }
                  - { label: "Price (e.g. From €120)", name: "price", widget: "string" }
                  - { label: "Feature this programme?", name: "featured", widget: "boolean", default: false }
                  - { label: "Featured badge (e.g. Most Popular)", name: "badge", widget: "string", required: false, default: "" }

          - label: "Therapies"
            name: "therapies"
            widget: "object"
            fields:
              - { label: "Section title", name: "title", widget: "string" }
              - { label: "Lead text", name: "lead", widget: "text" }
              - label: "Therapies (cards)"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Icon (Unicode symbol)", name: "icon", widget: "string", hint: "You can leave as-is. E.g: ✦ ◈ ⬡ ❧ ◎" }
                  - { label: "Therapy name", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }

          - label: "Testimonials"
            name: "testimonials"
            widget: "object"
            fields:
              - { label: "Section title", name: "title", widget: "string" }
              - label: "Testimonials"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Testimonial text", name: "text", widget: "text" }
                  - { label: "Attribution (e.g. Guest, 2-Day Programme)", name: "cite", widget: "string" }

          - label: "Our Approach"
            name: "approach"
            widget: "object"
            fields:
              - { label: "Section title", name: "title", widget: "string" }
              - { label: "Paragraphs", name: "paragraphs", widget: "list", field: { label: "Paragraph", name: "paragraph", widget: "text" } }
              - { label: "Highlighted phrase (at end)", name: "highlight", widget: "text" }

          - label: "Quote Banner"
            name: "quote_banner"
            widget: "object"
            fields:
              - { label: "Banner phrase", name: "text", widget: "string" }

          - label: "Contact — Labels"
            name: "contact"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Section title", name: "title", widget: "string" }
              - { label: "Lead text", name: "lead", widget: "text" }
              - { label: "Email label", name: "email_label", widget: "string" }
              - { label: "Phone label", name: "phone_label", widget: "string" }
              - { label: "Instagram label", name: "instagram_label", widget: "string" }

          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - { label: "Footer quote", name: "quote", widget: "string" }
              - { label: "Copyright notice", name: "copyright", widget: "string" }

  # ============================================================
  # PARTILHADO / SHARED
  # ============================================================
  - name: "shared"
    label: "📞 Partilhado / Shared"
    description: "Conteúdo partilhado entre as duas línguas (contactos, galeria de fotos)"
    files:
      - file: "_data/contact.yml"
        label: "Contactos"
        name: "contact"
        fields:
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Telefone (visível)", name: "phone_display", widget: "string", hint: "Como aparece na página, ex. +351 912 345 678" }
          - { label: "Telefone (link)", name: "phone_link", widget: "string", hint: "Apenas dígitos, com indicativo: +351912345678" }
          - { label: "Instagram — handle (@nome)", name: "instagram_handle", widget: "string" }
          - { label: "Instagram — link completo", name: "instagram_url", widget: "string", hint: "Ex: https://instagram.com/casadalili" }

      - file: "_data/gallery.yml"
        label: "Galeria de Fotos"
        name: "gallery"
        fields:
          - label: "Fotos"
            name: "photos"
            widget: "list"
            fields:
              - { label: "Imagem", name: "src", widget: "image" }
              - { label: "Descrição (PT)", name: "alt_pt", widget: "string", hint: "Para pessoas com deficiência visual" }
              - { label: "Descrição (EN)", name: "alt_en", widget: "string" }
