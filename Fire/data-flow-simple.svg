<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1280" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#586069"/>
    </marker>
  </defs>

  <rect width="900" height="1280" fill="#ffffff"/>

  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#24292e">
    How a wildfire reaches your phone
  </text>
  <text x="450" y="68" text-anchor="middle" font-size="13" fill="#586069">
    From a satellite spotting heat to a notification on your screen — usually under 30 minutes.
  </text>

  <!-- 1. Satellites -->
  <g>
    <rect x="180" y="100" width="540" height="105" rx="10" fill="#fff5b1" stroke="#d4a72c" stroke-width="2"/>
    <text x="450" y="132" text-anchor="middle" font-size="16" font-weight="700" fill="#24292e">Satellites watch Europe day &amp; night</text>
    <text x="450" y="158" text-anchor="middle" font-size="12" fill="#444d56">NASA satellites pass over every few hours and detect heat from above.</text>
    <text x="450" y="178" text-anchor="middle" font-size="12" fill="#444d56">A new fire shows up as a bright spot in their thermal cameras.</text>
  </g>
  <line x1="450" y1="205" x2="450" y2="245" stroke="#586069" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 2. NASA shares the data -->
  <g>
    <rect x="180" y="250" width="540" height="100" rx="10" fill="#f1f8ff" stroke="#0366d6" stroke-width="1.5"/>
    <text x="450" y="278" text-anchor="middle" font-size="15" font-weight="700" fill="#24292e">NASA publishes the locations</text>
    <text x="450" y="304" text-anchor="middle" font-size="12" fill="#444d56">A free public service called FIRMS shares every detection</text>
    <text x="450" y="322" text-anchor="middle" font-size="12" fill="#444d56">within a few hours of the satellite seeing it.</text>
    <text x="450" y="342" text-anchor="middle" font-size="11" fill="#586069">Same data used by firefighters &amp; researchers worldwide.</text>
  </g>
  <line x1="450" y1="350" x2="450" y2="390" stroke="#586069" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 3. Filtering -->
  <g>
    <rect x="100" y="395" width="700" height="160" rx="10" fill="#fffbdd" stroke="#d4a72c" stroke-width="2"/>
    <text x="450" y="423" text-anchor="middle" font-size="15" font-weight="700" fill="#24292e">We separate real fires from false alarms</text>

    <g font-size="13" fill="#24292e">
      <circle cx="135" cy="455" r="8" fill="#d73a49"/>
      <text x="155" y="461">Industrial heat (factories, gas flares) — filtered out</text>

      <circle cx="135" cy="485" r="8" fill="#d73a49"/>
      <text x="155" y="491">Sun reflecting off rooftops or water — filtered out</text>

      <circle cx="135" cy="515" r="8" fill="#d73a49"/>
      <text x="155" y="521">Hotspots that vanish on the next satellite pass — dropped</text>

      <circle cx="135" cy="545" r="8" fill="#2ea44f"/>
      <text x="155" y="551">Persistent, hot, high-confidence detections — kept</text>
    </g>
  </g>
  <line x1="450" y1="555" x2="450" y2="595" stroke="#586069" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 4. Match against your radius -->
  <g>
    <rect x="180" y="600" width="540" height="120" rx="10" fill="#f6f8fa" stroke="#586069" stroke-width="1.5"/>
    <text x="450" y="628" text-anchor="middle" font-size="15" font-weight="700" fill="#24292e">Is the fire near you?</text>
    <text x="450" y="654" text-anchor="middle" font-size="12" fill="#444d56">Each fire is checked against the alert radius you set in the app.</text>
    <text x="450" y="672" text-anchor="middle" font-size="12" fill="#444d56">If it's outside your radius — no notification.</text>
    <text x="450" y="694" text-anchor="middle" font-size="11" fill="#586069">You'll never get the same fire pushed to your phone twice.</text>
  </g>
  <line x1="450" y1="720" x2="450" y2="760" stroke="#586069" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 5. Translation -->
  <g>
    <rect x="180" y="765" width="540" height="100" rx="10" fill="#dcffe4" stroke="#2ea44f" stroke-width="1.5"/>
    <text x="450" y="793" text-anchor="middle" font-size="15" font-weight="700" fill="#24292e">The alert is written in your language</text>
    <text x="450" y="819" text-anchor="middle" font-size="12" fill="#444d56">13 languages supported · country names &amp; distance localised.</text>
    <text x="450" y="839" text-anchor="middle" font-size="12" fill="#586069">"Fire detected in Spain · 12 km north-west of you"</text>
  </g>
  <line x1="450" y1="865" x2="450" y2="905" stroke="#586069" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 6. Phone -->
  <g>
    <rect x="100" y="910" width="700" height="200" rx="10" fill="#fff5b1" stroke="#d4a72c" stroke-width="2"/>
    <text x="450" y="938" text-anchor="middle" font-size="15" font-weight="700" fill="#24292e">Your phone shows the alert</text>

    <g>
      <rect x="160" y="960" width="240" height="125" rx="8" fill="#ffffff" stroke="#d4a72c" stroke-width="1.5"/>
      <text x="280" y="985" text-anchor="middle" font-size="13" font-weight="700" fill="#24292e">iPhone · iPad · Mac</text>
      <text x="280" y="1009" text-anchor="middle" font-size="12" fill="#444d56">Banner on the lock screen</text>
      <text x="280" y="1027" text-anchor="middle" font-size="12" fill="#444d56">Tap to open the map</text>
      <text x="280" y="1045" text-anchor="middle" font-size="12" fill="#444d56">centred on the fire</text>
      <text x="280" y="1070" text-anchor="middle" font-size="11" fill="#586069">Wind &amp; spread overlays</text>
    </g>

    <g>
      <rect x="500" y="960" width="240" height="125" rx="8" fill="#ffffff" stroke="#d4a72c" stroke-width="1.5"/>
      <text x="620" y="985" text-anchor="middle" font-size="13" font-weight="700" fill="#24292e">Android phones</text>
      <text x="620" y="1009" text-anchor="middle" font-size="12" fill="#444d56">Heads-up notification</text>
      <text x="620" y="1027" text-anchor="middle" font-size="12" fill="#444d56">Tap to jump straight</text>
      <text x="620" y="1045" text-anchor="middle" font-size="12" fill="#444d56">to the fire on the map</text>
      <text x="620" y="1070" text-anchor="middle" font-size="11" fill="#586069">Same overlays available</text>
    </g>
  </g>

  <!-- Bottom note -->
  <g>
    <rect x="180" y="1140" width="540" height="80" rx="8" fill="#fff5f5" stroke="#d73a49" stroke-width="1.5"/>
    <text x="450" y="1167" text-anchor="middle" font-size="13" font-weight="700" fill="#24292e">No human in the loop</text>
    <text x="450" y="1189" text-anchor="middle" font-size="11" fill="#444d56">From satellite to your phone is fully automatic.</text>
    <text x="450" y="1206" text-anchor="middle" font-size="11" fill="#444d56">Always treat alerts as one signal — not the only source for safety decisions.</text>
  </g>
</svg>
