<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1820" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#586069"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d73a49"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f9826c"/>
    </marker>
  </defs>

  <rect width="900" height="1820" fill="#ffffff"/>

  <text x="450" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#24292e">
    How a wildfire reaches your phone
  </text>
  <text x="450" y="65" text-anchor="middle" font-size="13" fill="#586069">
    From satellite thermal anomaly to localised push — under 30 minutes, no human in the loop.
  </text>

  <!-- 1. Satellites -->
  <g>
    <rect x="100" y="95" width="700" height="105" rx="10" fill="#fff5b1" stroke="#d4a72c" stroke-width="2"/>
    <text x="450" y="122" text-anchor="middle" font-size="15" font-weight="700" fill="#24292e">Polar-orbiting satellites · VIIRS thermal-IR sensors</text>

    <g font-size="12" fill="#24292e">
      <rect x="135" y="138" width="200" height="48" rx="6" fill="#ffffff" stroke="#d4a72c" stroke-width="1"/>
      <text x="235" y="158" text-anchor="middle" font-weight="700">NOAA-20</text>
      <text x="235" y="175" text-anchor="middle" font-size="11" fill="#586069">VIIRS · 375 m</text>

      <rect x="350" y="138" width="200" height="48" rx="6" fill="#ffffff" stroke="#d4a72c" stroke-width="1"/>
      <text x="450" y="158" text-anchor="middle" font-weight="700">Suomi-NPP</text>
      <text x="450" y="175" text-anchor="middle" font-size="11" fill="#586069">VIIRS · 375 m</text>

      <rect x="565" y="138" width="200" height="48" rx="6" fill="#ffffff" stroke="#d4a72c" stroke-width="1"/>
      <text x="665" y="158" text-anchor="middle" font-weight="700">NOAA-21</text>
      <text x="665" y="175" text-anchor="middle" font-size="11" fill="#586069">VIIRS · 375 m</text>
    </g>
  </g>
  <line x1="450" y1="200" x2="450" y2="235" stroke="#586069" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="465" y="222" font-size="11" fill="#586069">downlink</text>

  <!-- 2. NASA FIRMS -->
  <g>
    <rect x="280" y="240" width="340" height="65" rx="8" fill="#f1f8ff" stroke="#0366d6" stroke-width="1.5"/>
    <text x="450" y="265" text-anchor="middle" font-size="14" font-weight="700" fill="#24292e">NASA FIRMS · firms.modaps.eosdis.nasa.gov</text>
    <text x="450" y="285" text-anchor="middle" font-size="11" fill="#586069">CSV per satellite per area · ~3 h end-to-end latency</text>
  </g>
  <line x1="450" y1="305" x2="450" y2="335" stroke="#586069" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="465" y="322" font-size="11" fill="#586069">poll every 30 min</text>

  <!-- 3. Worker fetch -->
  <g>
    <rect x="220" y="340" width="460" height="75" rx="8" fill="#f1f8ff" stroke="#0366d6" stroke-width="1.5"/>
    <text x="450" y="365" text-anchor="middle" font-size="14" font-weight="700" fill="#24292e">Cloudflare Worker · fetchFirmsHotspots()</text>
    <text x="450" y="384" text-anchor="middle" font-size="11" fill="#444d56">Europe bbox: −25°/30°/45°/72° W·S·E·N · two satellites in parallel</text>
    <text x="450" y="401" text-anchor="middle" font-size="11" fill="#586069">FIRMS_MAP_KEY secret · per-source HTTP failures logged + skipped</text>
  </g>
  <line x1="450" y1="415" x2="450" y2="445" stroke="#586069" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 4. Noise filters -->
  <g>
    <rect x="100" y="450" width="700" height="155" rx="10" fill="#fff5f5" stroke="#d73a49" stroke-width="2"/>
    <text x="450" y="477" text-anchor="middle" font-size="15" font-weight="700" fill="#24292e">Noise filters — drop weak signals &amp; sun glint</text>

    <g font-size="12" fill="#24292e">
      <circle cx="135" cy="510" r="7" fill="#d73a49"/>
      <text x="155" y="515"><tspan font-weight="700">Confidence</tspan> · drop "low" (l) or numeric &lt; 30</text>

      <circle cx="135" cy="540" r="7" fill="#d73a49"/>
      <text x="155" y="545"><tspan font-weight="700">FRP ≥ 5 MW</tspan> · fire radiative power · cuts weak heat sources</text>

      <circle cx="135" cy="570" r="7" fill="#d73a49"/>
      <text x="155" y="575"><tspan font-weight="700">Brightness ≥ 295 K</tspan> · bright_ti4 channel · drops sun-glint reflections</text>
    </g>
    <text x="450" y="595" text-anchor="middle" font-size="11" fill="#586069">Each filter applied per CSV row before the hotspot enters the pipeline</text>
  </g>
  <line x1="450" y1="605" x2="450" y2="635" stroke="#586069" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 5. Country & dedup -->
  <g>
    <rect x="100" y="640" width="700" height="100" rx="8" fill="#f6f8fa" stroke="#586069" stroke-width="1.5"/>
    <text x="450" y="665" text-anchor="middle" font-size="14" font-weight="700" fill="#24292e">Country tag · dedup · persistence guard</text>
    <text x="450" y="687" text-anchor="middle" font-size="11" fill="#444d56">bbox lookup → ISO country (PT, ES, FR, DE, IT, NL, BE, AT, GR, PL, …, 25+ countries)</text>
    <text x="450" y="704" text-anchor="middle" font-size="11" fill="#444d56">Composite ID = lat₃ + lng₃ + UTC date · D1 collapses repeat passes</text>
    <text x="450" y="721" text-anchor="middle" font-size="11" fill="#d73a49" font-weight="600">Single-pass hotspots (not seen in two consecutive polls) are dropped</text>
  </g>
  <line x1="450" y1="740" x2="450" y2="770" stroke="#586069" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 6. PT pre-emption -->
  <g>
    <rect x="220" y="775" width="460" height="65" rx="8" fill="#dcffe4" stroke="#2ea44f" stroke-width="1.5"/>
    <text x="450" y="800" text-anchor="middle" font-size="14" font-weight="700" fill="#24292e">Portugal pre-empted by ANEPC</text>
    <text x="450" y="820" text-anchor="middle" font-size="11" fill="#586069">PT hotspots dropped here — Alerta's official feed owns Portuguese fires</text>
  </g>
  <line x1="450" y1="840" x2="450" y2="870" stroke="#586069" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 7. Persistent-heat blocklist (NEW) -->
  <g>
    <rect x="100" y="875" width="700" height="155" rx="10" fill="#fff5f5" stroke="#d73a49" stroke-width="2"/>
    <text x="450" y="902" text-anchor="middle" font-size="15" font-weight="700" fill="#24292e">Persistent-heat blocklist — known false-positives</text>

    <g font-size="12" fill="#24292e">
      <text x="120" y="930" font-size="13">🏭</text>
      <text x="155" y="932"><tspan font-weight="700">Industrial sites</tspan> — Duisburg, IJmuiden, Ghent, Antwerp, Linz, Marghera, Tarento, Lipetsk, Kryvyi Rih, …</text>

      <text x="120" y="958" font-size="13">🌋</text>
      <text x="155" y="960"><tspan font-weight="700">Active volcanoes</tspan> — Stromboli, Etna, Vulcano, Campi Flegrei, Santorini, Reykjanes</text>
    </g>
    <text x="450" y="990" text-anchor="middle" font-size="11" fill="#444d56">Bbox-based lookup at dispatch time · suppresses push fan-out only</text>
    <text x="450" y="1009" text-anchor="middle" font-size="11" fill="#586069">Hotspots still archived in D1 so the dashboard can show them &amp; we can refine the list</text>
  </g>
  <line x1="450" y1="1030" x2="450" y2="1060" stroke="#586069" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 8. Device matching -->
  <g>
    <rect x="100" y="1065" width="700" height="120" rx="10" fill="#fffbdd" stroke="#d4a72c" stroke-width="2"/>
    <text x="450" y="1092" text-anchor="middle" font-size="15" font-weight="700" fill="#24292e">Match each hotspot against every registered device</text>
    <text x="450" y="1115" text-anchor="middle" font-size="11" fill="#444d56">Haversine distance · device alert radius (default 25 km, user-configurable)</text>
    <text x="450" y="1132" text-anchor="middle" font-size="11" fill="#444d56">Per-device dedup: never push the same fire twice (fire_id ✕ device key)</text>
    <text x="450" y="1149" text-anchor="middle" font-size="11" fill="#444d56">Quiet hours / muted countries respected before queuing the push</text>
    <text x="450" y="1168" text-anchor="middle" font-size="10" fill="#586069">D1 keeps push-history rows for 30 days · cleanupOldData() prunes nightly</text>
  </g>
  <line x1="450" y1="1185" x2="450" y2="1215" stroke="#586069" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 9. Localisation -->
  <g>
    <rect x="100" y="1220" width="700" height="125" rx="10" fill="#fff5b1" stroke="#d4a72c" stroke-width="2"/>
    <text x="450" y="1247" text-anchor="middle" font-size="15" font-weight="700" fill="#24292e">Localise the title &amp; body to the device's language</text>
    <text x="450" y="1270" text-anchor="middle" font-size="11" fill="#444d56">13 languages · en · pt · de · es · fr · it · el · pl · sv · nb · fi · ar · sr</text>
    <text x="450" y="1288" text-anchor="middle" font-size="11" fill="#444d56">Country name resolved into the user's locale (e.g. "Spagna" / "Hiszpania" / "Deutschland")</text>
    <text x="450" y="1306" text-anchor="middle" font-size="11" fill="#444d56">Distance + cardinal bearing baked into the body string</text>
    <text x="450" y="1328" text-anchor="middle" font-size="10" fill="#586069">Falls back to English when the device language isn't in the catalogue</text>
  </g>
  <line x1="450" y1="1345" x2="450" y2="1375" stroke="#586069" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 10. FCM -->
  <g>
    <rect x="220" y="1380" width="460" height="80" rx="8" fill="#f1f8ff" stroke="#0366d6" stroke-width="1.5"/>
    <text x="450" y="1405" text-anchor="middle" font-size="14" font-weight="700" fill="#24292e">Firebase Cloud Messaging · HTTP v1</text>
    <text x="450" y="1426" text-anchor="middle" font-size="11" fill="#444d56">Service-account JWT signed in the Worker · per-device send</text>
    <text x="450" y="1443" text-anchor="middle" font-size="11" fill="#586069">404 / unregistered → device pruned from D1 next sweep</text>
  </g>

  <!-- Two pipes: APNs + Android -->
  <line x1="320" y1="1460" x2="280" y2="1500" stroke="#586069" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="580" y1="1460" x2="620" y2="1500" stroke="#586069" stroke-width="2" marker-end="url(#arrow)"/>

  <g>
    <rect x="100" y="1505" width="360" height="75" rx="8" fill="#f6f8fa" stroke="#586069" stroke-width="1.5"/>
    <text x="280" y="1530" text-anchor="middle" font-size="14" font-weight="700" fill="#24292e">APNs · Apple Push</text>
    <text x="280" y="1551" text-anchor="middle" font-size="11" fill="#586069">iOS · iPadOS · macOS</text>
    <text x="280" y="1568" text-anchor="middle" font-size="11" fill="#586069">FCM relays via APNs token</text>
  </g>

  <g>
    <rect x="440" y="1505" width="360" height="75" rx="8" fill="#f6f8fa" stroke="#586069" stroke-width="1.5"/>
    <text x="620" y="1530" text-anchor="middle" font-size="14" font-weight="700" fill="#24292e">FCM · Android transport</text>
    <text x="620" y="1551" text-anchor="middle" font-size="11" fill="#586069">Android 8+ · notification channels</text>
    <text x="620" y="1568" text-anchor="middle" font-size="11" fill="#586069">Direct FCM token delivery</text>
  </g>

  <line x1="280" y1="1580" x2="280" y2="1610" stroke="#586069" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="620" y1="1580" x2="620" y2="1610" stroke="#586069" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 11. End devices -->
  <g>
    <rect x="100" y="1615" width="700" height="155" rx="10" fill="#fff5b1" stroke="#d4a72c" stroke-width="2"/>
    <text x="450" y="1642" text-anchor="middle" font-size="15" font-weight="700" fill="#24292e">Phone shows the alert</text>

    <g>
      <rect x="160" y="1660" width="240" height="100" rx="8" fill="#ffffff" stroke="#d4a72c" stroke-width="1.5"/>
      <text x="280" y="1683" text-anchor="middle" font-size="13" font-weight="700" fill="#24292e">iOS · iPadOS · macOS</text>
      <text x="280" y="1704" text-anchor="middle" font-size="11" fill="#444d56">Lock-screen banner · tap → map</text>
      <text x="280" y="1721" text-anchor="middle" font-size="11" fill="#444d56">VIIRS overlay + spread cone</text>
      <text x="280" y="1742" text-anchor="middle" font-size="10" fill="#586069">App polls every 10 min</text>
    </g>

    <g>
      <rect x="500" y="1660" width="240" height="100" rx="8" fill="#ffffff" stroke="#d4a72c" stroke-width="1.5"/>
      <text x="620" y="1683" text-anchor="middle" font-size="13" font-weight="700" fill="#24292e">Android</text>
      <text x="620" y="1704" text-anchor="middle" font-size="11" fill="#444d56">Heads-up notification · MapActivity</text>
      <text x="620" y="1721" text-anchor="middle" font-size="11" fill="#444d56">Same overlays · doze-aware</text>
      <text x="620" y="1742" text-anchor="middle" font-size="10" fill="#586069">WorkManager periodic resync</text>
    </g>
  </g>

  <text x="450" y="1800" text-anchor="middle" font-size="10" fill="#959da5">
    No human in the loop · no manual moderation · all filters automated (FRP/brightness/confidence + persistence guard + heat-source blocklist)
  </text>
</svg>
