# Verifies cross-link footers in sub-app pages stay in sync with the master
# list of apps in /index.html.
#
# Two jobs:
#   1. fire-footer (HARD)  — fails the build if Fire's footer drifts.
#                            Keeps Fire perfectly aligned.
#   2. audit-other-footers (HARD) — loops through every other sub-app and
#                            fails the build if any footer drifts from the
#                            master root /index.html list. Cleanup pass on
#                            2026-05-08 brought all 27 sub-apps into sync.

name: Check cross-links

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual trigger from the Actions tab when you want to re-verify without
  # making a commit.
  workflow_dispatch:

jobs:
  fire-footer:
    name: Fire footer ≡ root index
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Fire footer matches root index
        shell: bash
        run: |
          set -euo pipefail

          # All apps linked from the master /index.html (relative folder
          # links only — drop anchors and external URLs). Strip Fire because
          # the Fire page doesn't link to itself.
          ROOT_APPS=$(grep -oE 'href="[^"#h][^"]+/"' index.html \
            | sed 's|^href="||;s|/"$||' \
            | grep -v '^Fire$' \
            | sort -u)

          # All cross-link folders referenced from Fire's footer.
          FIRE_APPS=$(grep -oE 'href="\.\./[^"]+/"' Fire/index.html \
            | sed 's|^href="\.\./||;s|/"$||' \
            | sort -u)

          if [ "$ROOT_APPS" != "$FIRE_APPS" ]; then
            echo "::error::Fire footer drifted from root index.html"
            echo
            echo "── Diff (left = Fire footer, right = expected from root) ──"
            diff <(echo "$FIRE_APPS") <(echo "$ROOT_APPS") || true
            echo
            echo "Fix: edit Fire/index.html so the <a href=\"../X/\">X</a> set"
            echo "in the footer matches the apps listed in /index.html."
            exit 1
          fi

          echo "✓ Fire footer matches root index ($(echo "$FIRE_APPS" | wc -l | tr -d ' ') apps)"

  audit-other-footers:
    name: All sub-app footers ≡ root index (hard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Report drift in every sub-app's footer
        shell: bash
        run: |
          set -uo pipefail

          # The canonical list of apps lives in /index.html.
          ROOT_APPS=$(grep -oE 'href="[^"#h][^"]+/"' index.html \
            | sed 's|^href="||;s|/"$||' \
            | sort -u)

          # Folders we explicitly skip — not sub-apps.
          SKIP_REGEX='^(\.github|casalilli|node_modules|assets|Fire)$'

          drifted=0
          checked=0
          summary=""

          # Helper: normalise URL-encoded spaces so "File Vortex" and
          # "File%20Vortex" compare equal — they're the same folder.
          urldecode() { sed 's|%20| |g'; }

          for dir in */; do
            app="${dir%/}"
            if echo "$app" | grep -qE "$SKIP_REGEX"; then continue; fi
            if [ ! -f "$dir/index.html" ]; then continue; fi
            # Skip retired/non-root folders — if the app isn't in the master
            # list, its footer isn't ours to enforce.
            if ! echo "$ROOT_APPS" | urldecode | grep -qx "$app"; then continue; fi
            # Only audit folders that actually have a cross-link footer (≥3
            # ../X/ style refs). Pages without a footer block are skipped.
            count=$(grep -cE 'href="\.\./[^"]+/"' "$dir/index.html" || true)
            if [ "${count:-0}" -lt 3 ]; then continue; fi

            checked=$((checked + 1))

            EXPECTED=$(echo "$ROOT_APPS" | urldecode | grep -v "^$app$" | sort -u)
            ACTUAL=$(grep -oE 'href="\.\./[^"]+/"' "$dir/index.html" \
              | sed 's|^href="\.\./||;s|/"$||' \
              | urldecode \
              | sort -u)

            if [ "$EXPECTED" = "$ACTUAL" ]; then
              echo "✓ $app"
              continue
            fi

            drifted=$((drifted + 1))

            stale=$(comm -23 <(echo "$ACTUAL") <(echo "$EXPECTED") | tr '\n' ',' | sed 's/,$//;s/,/, /g')
            missing=$(comm -13 <(echo "$ACTUAL") <(echo "$EXPECTED") | tr '\n' ',' | sed 's/,$//;s/,/, /g')

            line="✗ $app"
            [ -n "$stale" ]   && line="$line · stale: $stale"
            [ -n "$missing" ] && line="$line · missing: $missing"

            echo "::warning title=$app footer drift::$line"
            echo "$line"
            summary="$summary$line"$'\n'
          done

          echo
          echo "── Audit summary ──"
          echo "Checked: $checked sub-apps"
          echo "Drifted: $drifted"

          # GitHub Actions step summary — appears as a nicely formatted
          # block on the run's overview page.
          {
            echo "## Cross-link footer audit"
            echo ""
            echo "**$checked** sub-apps audited · **$drifted** drifted from root index"
            echo ""
            if [ "$drifted" -gt 0 ]; then
              echo "### Drift detail"
              echo ""
              echo '```'
              echo "$summary"
              echo '```'
              echo ""
              echo "_stale_ = listed in this footer but no longer in root index (retired/renamed)."
              echo "_missing_ = in root index but not yet linked from this footer."
            else
              echo "All sub-app footers match the root index. ✓"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          # Hard mode: fail the build if any sub-app footer drifted.
          if [ "$drifted" -gt 0 ]; then
            echo "::error::$drifted sub-app footer(s) drifted from root index.html"
            exit 1
          fi
